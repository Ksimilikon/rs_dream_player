[package]
name = "dream_player"
version = "0.1.0"
edition = "2024"

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }
clap = { version = "4.6.0", features = ["derive"] }
api = { path = "api" }
player = { path = "player" }
uuid = { version = "1.22.0", features = ["v4", "serde"] }
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
directories = "6.0.0"

zbus = "5.13.2"

# [target.'cfg(target_os="linux")'.dependencied]
# zbus = "5.13.1"

[dev-dependencies]
tempfile = "3.24.0"
serial_test = "3.3.1"
get-size = "0.1.4"
